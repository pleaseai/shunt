# SonarQube Cloud project configuration.
# sonar.token is supplied by CI via SONAR_TOKEN; the scanner defaults to sonarcloud.io
# when sonar.organization is set.
# Rust is not supported by SonarCloud automatic analysis, so this repo uses CI-based
# analysis (see .github/workflows/ci.yml).

sonar.organization=pleaseai
sonar.projectKey=pleaseai_shunt
sonar.projectName=shunt

sonar.sources=src
sonar.tests=tests

sonar.exclusions=**/target/**

# Coverage: lcov generated by cargo-llvm-cov in CI before the scan.
sonar.rust.lcov.reportPaths=lcov.info

sonar.sourceEncoding=UTF-8
